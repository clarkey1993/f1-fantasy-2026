{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-3">✍️ Join the {{ year }} League</h2>
        
        <div class="card mb-4">
            <div class="card-body">
                <h5>📜 Rules Summary</h5>
                <ul>
                    <li><strong>Entry Fee:</strong> £5 per race.</li>
                    <li><strong>Team:</strong> 10 Drivers, 6 Constructors.</li>
                    <li><strong>Scoring:</strong> Points for Grid, Finishing Pos, Laps, and Overtakes.</li>
                </ul>
            </div>
        </div>

        <form method="post">
            <div class="row mb-3">
                <div class="col">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="name" required>
                </div>
                <div class="col">
                    <label class="form-label">Team Nickname</label>
                    <input type="text" class="form-control" name="nickname" required>
                </div>
            </div>
            <!-- Full selection logic would go here -->
            <button type="submit" class="btn btn-primary btn-lg w-100">Submit Team (Disabled in Demo)</button>
        </form>
    </div>
</div>
{% endblock %}
